diagnostic_dump:
  name: Diagnostic Dump
  description: Dump all WebSocket telemetry data from connected Creality printers to JSON format for troubleshooting and analysis.
  fields:
    include_sensitive_data:
      name: Include Sensitive Data
      description: Whether to include potentially sensitive data in the diagnostic output (currently unused, reserved for future use)
      required: false
      default: false
      selector:
        boolean:

request_cfs_info:
  name: Request CFS Info
  description: Manually request the printer to send the latest CFS (multifiament) information including temperatures, humidity, and filament details.

cfs_load:
  name: CFS Load
  description: Request the printer to load filament from a specific CFS box and slot.
  fields:
    box_id:
      name: Box ID
      description: The ID of the CFS box (0-3).
      required: true
      selector:
        number:
          min: 0
          max: 3
          mode: box
    slot_id:
      name: Slot ID
      description: The ID of the slot in the CFS box (0-3).
      required: true
      selector:
        number:
          min: 0
          max: 3
          mode: box

cfs_unload:
  name: CFS Unload
  description: Request the printer to unload filament from a specific CFS box and slot.
  fields:
    box_id:
      name: Box ID
      description: The ID of the CFS box (0-3).
      required: true
      selector:
        number:
          min: 0
          max: 3
          mode: box
    slot_id:
      name: Slot ID
      description: The ID of the slot in the CFS box (0-3).
      required: true
      selector:
        number:
          min: 0
          max: 3
          mode: box
